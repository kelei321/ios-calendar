name: iOS CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Build and test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show available destinations
        run: |
          xcodebuild -showdestinations \
            -project CalendarMVP.xcodeproj \
            -scheme CalendarMVP

      - name: Test CalendarMVP
        run: |
          xcodebuild test \
            -project CalendarMVP.xcodeproj \
            -scheme CalendarMVP \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.5'
